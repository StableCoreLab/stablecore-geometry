name: ci-windows-cmake

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache googletest downloads
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/../StablecoreGeometryBuild/_deps
          key: gtest-windows-v1.17.0-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            gtest-windows-v1.17.0-
            gtest-windows-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/../StablecoreGeometryBuild/stablecore_geometry.dir
            ${{ github.workspace }}/../StablecoreGeometryBuild/tests
            ${{ github.workspace }}/../StablecoreGeometryBuild/RelWithDebInfo
          key: cmake-build-windows-${{ hashFiles('CMakeLists.txt', 'include/**', 'src/**', 'tests/**') }}
          restore-keys: |
            cmake-build-windows-

      - name: Show tool versions
        shell: pwsh
        run: |
          cmake --version
          ctest --version

      - name: Configure (CMake preset)
        shell: pwsh
        run: cmake --preset vs2022-x64

      - name: Build (RelWithDebInfo)
        shell: pwsh
        run: cmake --build --preset vs2022-x64-build --config RelWithDebInfo --parallel

      - name: Test (CTest preset)
        shell: pwsh
        run: ctest --preset vs2022-x64-test -C RelWithDebInfo --output-on-failure
